<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Haudenosaunee Historical Map</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <a href="https://jaycebui.github.io/Social_Studies_Website/" class="back-link">Back to Main Menu</a>
    <div id="map"></div>
    <div class="controls">
        <div class="header-row">
            <div class="info-box">Year: <span id="year-display">1300</span></div>
            <div class="playback-controls">
                <button id="event-trigger-btn" class="hidden" onclick="openManualPopup()">🔔 View Event Details</button>
                <button id="back-popup-btn" class="back-btn hidden" onclick="goToLastPopup()">Go Back To Last Popup?</button>
                <button id="play-btn" onclick="togglePlay()">▶ Play Timeline</button>
                <button onclick="resetTimeline()">🔄 Reset</button>
            </div>
        </div>
       
        <div style="text-align: center; margin-bottom: 10px;">
<div style="text-align: center; margin: 20px 0;">
    <a href="Info.html" style="color: #2c5282; font-weight: bold; text-decoration: underline; font-family: 'Segoe UI', sans-serif; font-size: 1.1rem;">
        Haudenosaunee Knowledge Hub
    </a>
</div>
            <a href="QuizIroquois.html" style="color: #2c5282; font-weight: bold; text-decoration: underline;">Iroquois Quiz</a>
        </div>
       
        <input type="range" id="timeline-slider" min="1300" max="1800" value="1300">
        <div class="labels">
            <span>1300</span><span>1400</span><span>1500</span><span>1600</span><span>1700</span><span>1800</span>
        </div>


<p><strong>Population:</strong> <span id="iroquoisPopulation"></span></p>


        <div class="content-grid">
    <div class="info-block">
        <strong>Lifestyle</strong>
        <p id="Lifestyle">Loading...</p>
    </div>
    <div class="info-block">
        <strong>Entertainment</strong>
        <p id="Entertainment">Loading...</p>
    </div>
    <div class="info-block">
        <strong>Territory</strong>
        <p id="Territory">Loading...</p>
    </div>
    <div class="info-block">
        <strong>Governance</strong>
        <p id="Governance">Loading...</p>
    </div>
</div>
             


            </div>
        </div>
    </div>


    <div class="info-footer">
        <div style="max-width: 1400px; margin: 0 auto 20px auto;">
            <label for="master-global-search" style="font-weight: bold; color: #2c5282; display: block; margin-bottom: 5px;">Global Directory Search:</label>
            <input type="search" id="master-global-search" class="search-input"
                   oninput="globalSearch()" placeholder="Search across all categories...">
                   <button class="clear-btn" onclick="clearSearch('master-global-search', 'your-list-id')">&times;</button>


        <div class="card-container">
            <div class="info-card">
                <h3>Villages</h3>
                <input type="search" id="minor-search" class="search-input" oninput="filterList('minor-search', 'master-minor-list')" placeholder="Search villages...">
                <div id="master-minor-list" class="master-list"></div>
            </div>


            <div class="info-card">
                <h3>Key Forts & Councils</h3>
                <input type="search" id="major-search" class="search-input" oninput="filterList('major-search', 'master-major-list')" placeholder="Search sites...">
                <div id="master-major-list" class="master-list"></div>
            </div>


            <div class="info-card">
                <h3>Timeline Events</h3>
                <input type="search" id="event-search" class="search-input" oninput="filterList('event-search', 'master-events-list')" placeholder="Search events...">
                <div id="master-events-list" class="master-list"></div>
            </div>
        </div>
    </div>


    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="script.js"></script>
</body>
</html>
