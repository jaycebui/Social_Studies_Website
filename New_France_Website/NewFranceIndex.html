<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>New France Historical Map</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="NewFranceStyle.css">
</head>
<body>
    <div class="back-nav">
    <a href="https://jaycebui.github.io/Social_Studies_Website/" class="back-link"><span>Back to Main Menu</span></a> 
    </div>
    <div id="map"></div>
    <div class="controls">
        <div class="header-row">
            <div class="info-box">Year: <span id="year-display">1534</span></div>
            <div class="playback-controls">
                <button id="event-trigger-btn" class="hidden" onclick="openManualPopup()">🔔 View Event Details</button>
                <button id="back-popup-btn" class="back-btn hidden" onclick="goToLastPopup()">Go Back To Last Popup?</button>
                <button id="play-btn" onclick="togglePlay()">▶ Play Timeline</button>
                <button onclick="resetTimeline()">🔄 Reset</button>
            </div>
        </div>
        
        <div class="portal-nav-inline">
    <div class="nav-item">
        <a href="Info.html" class="new-france-link">Knowledge Hub</a>
    </div>
    <div class="nav-item">
        <a href="QuizNewFrance.html" class="new-france-gold-button">New France Quiz</a>
    </div>
</div>
       
        <input type="range" id="timeline-slider" min="1534" max="1763" value="1534">
        <div class="labels" style="position: relative; width: 100%; height: 25px; margin-top: 5px; font-family: 'Arial'; font-size: 0.9rem; color: #1a365d; font-weight: bold;">
    <span style="position: absolute; left: 0%;">1534</span>
    
    <span style="position: absolute; left: 29%; transform: translateX(-50%);">1600</span>

    <span style="position: absolute; left: 50.75%; transform: translateX(-50%);">1650</span>
    
    <span style="position: absolute; left: 72.5%; transform: translateX(-50%);">1700</span>
    
    <span style="position: absolute; right: 0%;">1763</span>
</div>
        <p><strong>Population:</strong> <span id="newFrancePopulation"></span></p>

        <div class="content-grid">
            <div class="info-block">
                <strong>Lifestyle</strong>
                <p id="Lifestyle">Loading...</p>
            </div>
            <div class="info-block">
                <strong>Entertainment</strong>
                <p id="Entertainment">Loading...</p>
            </div>
            <div class="info-block">
                <strong>Territory</strong>
                <p id="Territory">Loading...</p>
            </div>
            <div class="info-block">
                <strong>Governance</strong>
                <p id="Governance">Loading...</p>
            </div>
        </div>
    </div>

    <div class="info-footer">
        <div style="max-width: 1400px; margin: 0 auto 20px auto;">
            <label for="master-global-search" style="font-weight: bold; color: #2c5282; display: block; margin-bottom: 5px;">Global Directory Search:</label>
            <input type="search" id="master-global-search" class="search-input" oninput="globalSearch()" placeholder="Search across all categories...">
        </div>

        <div class="card-container">
            <div class="info-card">
                <h3>Colonies & Settlements</h3>
                <input type="search" id="major-search" class="search-input" oninput="filterList('major-search', 'master-major-list')" placeholder="Search cities...">
                <div id="master-major-list" class="master-list"></div>
            </div>

            <div class="info-card">
                <h3>Forts & Outposts</h3>
                <input type="search" id="minor-search" class="search-input" oninput="filterList('minor-search', 'master-minor-list')" placeholder="Search forts...">
                <div id="master-minor-list" class="master-list"></div>
            </div>

            <div class="info-card">
                <h3>Timeline Events</h3>
                <input type="search" id="event-search" class="search-input" oninput="filterList('event-search', 'master-events-list')" placeholder="Search events...">
                <div id="master-events-list" class="master-list"></div>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="NewFranceScript.js"></script>
</body>
</html>
